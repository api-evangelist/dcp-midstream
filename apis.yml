common:
  - type: AcquiredBy
    name: Acquired by Phillips 66
    url: https://www.phillips66.com/midstream/
    description: >-
      Phillips 66 completed the take-private acquisition of DCP Midstream LP
      in June 2023 for approximately $3.8 billion in cash, lifting its
      ownership of DCP to 86.8%. DCP Midstream's assets were merged with
      Phillips 66 Partners and are now operated as part of Phillips 66's NGL
      and midstream business segment.
  - type: Successor
    name: Phillips 66 Midstream
    url: https://www.phillips66.com/midstream/
    description: >-
      Phillips 66's midstream segment now operates the integrated NGL,
      natural gas gathering and processing, and refined products pipeline
      assets previously owned by DCP Midstream and Phillips 66 Partners,
      including more than 72,000 miles of pipeline, 11 NGL fractionation
      plants, ~889,000 bpd of fractionation capacity, and ~4.8 Bcf/d of
      natural gas processing capacity.
  - type: SuccessorAPIs
    name: Phillips 66 (No Public API Program)
    url: https://github.com/api-evangelist/phillips-66
    description: >-
      Phillips 66, the corporate parent that absorbed DCP Midstream, does
      not operate a public developer program, OpenAPI surface, SDK
      portfolio, or status page. There is no DCP-branded API program that
      survived the merger.
  - type: History
    name: Company History
    url: https://en.wikipedia.org/wiki/DCP_Midstream
    description: >-
      DCP Midstream was headquartered in Denver, Colorado, and was a
      Fortune 500 midstream petroleum services provider with hundreds of
      employees and multi-billion-dollar enterprise value prior to its
      take-private acquisition by Phillips 66.
  - type: FormerWebsite
    name: dcpmidstream.com (Retired)
    url: https://dcpmidstream.com
    description: >-
      The former corporate website at dcpmidstream.com no longer resolves
      to a working DCP Midstream site (TLS/cert errors observed on
      2026-05-23). Phillips 66 has consolidated all DCP-related
      communications onto phillips66.com.
