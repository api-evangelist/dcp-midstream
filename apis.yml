name: DCP Midstream (Acquired by Phillips 66)
description: >-
  DCP Midstream LLC was a Denver, Colorado-based natural gas gathering,
  processing, and NGL transportation company that operated as one of the
  largest U.S. producers and marketers of natural gas liquids. In June 2023,
  Phillips 66 completed the acquisition of all publicly traded common units of
  DCP Midstream LP for approximately $3.8 billion, taking its ownership stake
  to 86.8%. DCP Midstream and Phillips 66 Partners were subsequently merged
  into Phillips 66's NGL and midstream business; the standalone brand, public
  filings, developer surface, and corporate website have been retired. The
  dcpmidstream.com domain no longer resolves to a working site, and there is
  no public DCP-branded developer portal, API reference, status page, or
  changelog. This repository documents DCP Midstream as a defunct entity
  absorbed into the Phillips 66 midstream organization.
